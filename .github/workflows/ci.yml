name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_HUB_USERNAME: annamorza

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    - name: Build Docker image
      run: |
        docker build -t $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} .
    
    - name: Push Docker image
      run: |
        docker push $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    - name: Pull Docker image
      run: |
        docker pull $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}
    
    - name: Run tests
      run: |
        docker run --rm $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} python -c "import test_app; test_app.test_import(); test_app.test_math()"

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    - name: Tag and publish as latest
      run: |
        docker pull $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}
        docker tag $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} $DOCKER_HUB_USERNAME/snalab:latest
        docker push $DOCKER_HUB_USERNAME/snalab:latest