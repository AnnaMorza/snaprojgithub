name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_HUB_USERNAME: annamorza

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    # ОТЛАДКА: Показать информацию о коммите
    - name: Debug - Show commit info
      run: |
        echo "GitHub SHA: ${GITHUB_SHA::7}"
        echo "GitHub Ref: ${{ github.ref }}"
        echo "Branch name: ${GITHUB_REF#refs/heads/}"
        echo "Event name: ${{ github.event_name }}"
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    # ОТЛАДКА: Проверить логин в Docker Hub
    - name: Debug - Verify Docker login
      run: |
        docker info
        echo "Docker login status:"
        docker system info | grep Username || echo "Not logged in"
    
    - name: Build Docker image
      run: |
        echo "Building image: $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}"
        docker build -t $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} .
    
    # ОТЛАДКА: Проверить созданные образы
    - name: Debug - List Docker images
      run: |
        docker images | grep snalab || echo "No images found"
    
    - name: Push Docker image
      run: |
        echo "Pushing image: $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}"
        docker push $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}
    
    - name: Echo success
      run: echo "✅ Build complete and pushed to Docker Hub"

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    # ОТЛАДКА: Показать SHA для тестирования
    - name: Debug - Show test SHA
      run: |
        echo "Testing image with SHA: ${GITHUB_SHA::7}"
        echo "Available images:"
        docker images || true
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    - name: Pull Docker image
      run: |
        echo "Pulling: $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}"
        docker pull $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}
    
    # ОТЛАДКА: Проверить содержимое образа
    - name: Debug - Inspect Docker image
      run: |
        docker inspect $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} | grep -E "Created|Entrypoint|Cmd" || true
        echo "Files in image:"
        docker run --rm $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} ls -la || true
    
    - name: Run tests
      run: |
        echo "Running tests..."
        docker run --rm $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} python -c "import test_app; test_app.test_import(); test_app.test_math()"
    
    # ОТЛАДКА: Проверить код выхода тестов
    - name: Debug - Check test exit code
      if: always()
      run: |
        echo "Test step completed with status: ${{ job.status }}"
    
    - name: Echo success
      run: echo "✅ Tests passed successfully!"

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    # ОТЛАДКА: Показать какие теги будут использованы
    - name: Debug - Show tags
      run: |
        echo "Source image: $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}"
        echo "Target latest: $DOCKER_HUB_USERNAME/snalab:latest"
        echo "Current tags on Docker Hub:"
        curl -s "https://hub.docker.com/v2/repositories/$DOCKER_HUB_USERNAME/snalab/tags/" | jq -r '.results[].name' | head -5 || true
    
    - name: Pull and tag as latest
      run: |
        docker pull $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7}
        docker tag $DOCKER_HUB_USERNAME/snalab:${GITHUB_SHA::7} $DOCKER_HUB_USERNAME/snalab:latest
        docker push $DOCKER_HUB_USERNAME/snalab:latest
    
    # ОТЛАДКА: Подтвердить публикацию
    - name: Debug - Verify latest tag
      run: |
        echo "Verifying latest tag..."
        docker pull $DOCKER_HUB_USERNAME/snalab:latest
        docker images | grep snalab
        echo "✅ Latest tag is now available"
    
    - name: Echo success
      run: echo "✅ Published as 'latest' to Docker Hub"

  # НОВЫЙ JOB: Отладочный job для PR (запускается всегда)
  debug:
    runs-on: ubuntu-latest
    if: always()  # Запускается даже при ошибках
    needs: [build, test, publish]
    
    steps:
    - name: Debug - Show job results
      if: always()
      run: |
        echo "=== CI/CD Pipeline Debug Info ==="
        echo "Build job status: ${{ needs.build.result }}"
        echo "Test job status: ${{ needs.test.result }}"
        echo "Publish job status: ${{ needs.publish.result }}"
        echo "GitHub Run ID: ${{ github.run_id }}"
        echo "GitHub Run Number: ${{ github.run_number }}"
        echo "Actor: ${{ github.actor }}"
        echo "Event: ${{ github.event_name }}"
        echo "Repository: ${{ github.repository }}"
        echo "================================="